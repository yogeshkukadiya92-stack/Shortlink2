<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnyLink Dashboard</title>
  <link rel="stylesheet" href="/styles.css?v=30">
</head>
<body class="auth-screen">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-row">
        <a class="brand-link" href="/home" aria-label="AnyLink home">
          <div class="brand-logo" aria-label="ShortLink logo">
            <svg class="brand-logo-art" viewBox="0 0 280 72" role="img" aria-hidden="true">
              <defs>
                <linearGradient id="chainBlue" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#1ed1ff" />
                  <stop offset="55%" stop-color="#2463e6" />
                  <stop offset="100%" stop-color="#183cae" />
                </linearGradient>
                <linearGradient id="arrowGreen" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#d8ff3c" />
                  <stop offset="60%" stop-color="#5fe000" />
                  <stop offset="100%" stop-color="#24a100" />
                </linearGradient>
              </defs>
              <g transform="translate(4 7)">
                <path d="M44 41c-9 0-16-7-16-16 0-4 1-8 4-11l18-18c6-6 14-9 22-9 13 0 24 7 29 18l-15 6c-3-6-8-9-15-9-4 0-8 2-11 5L42 25c-1 2-2 4-2 6 0 5 4 9 9 9 2 0 4-1 6-2l8-8 13 6-9 9c-6 5-14 8-23 8Z" fill="url(#chainBlue)"/>
                <path d="M74 48c-13 0-24-7-29-18l15-6c3 6 8 9 15 9 4 0 8-2 11-5l18-18c1-2 2-4 2-6 0-5-4-9-9-9-2 0-4 1-6 2l-8 8-13-6 9-9c6-5 14-8 23-8 9 0 16 7 16 16 0 4-1 8-4 11L96 39c-6 6-14 9-22 9Z" fill="url(#chainBlue)"/>
                <path d="M82 18 119 2l-7 37-10-9-19 18-11-5 21-20-11-5Z" fill="url(#arrowGreen)"/>
              </g>
              <text x="126" y="48" fill="#2147c0" font-size="34" font-weight="800" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-1">Short</text>
              <text x="208" y="48" fill="#4caf10" font-size="34" font-weight="800" font-family="Segoe UI, Arial, sans-serif" letter-spacing="-1">Link</text>
            </svg>
          </div>
          <div class="brand-copy brand-copy-tagline">
            <span>Smart Link OS</span>
          </div>
        </a>
      </div>

      <a class="create-button" href="/home">Create new</a>

      <nav class="side-nav" aria-label="Primary">
        <a class="nav-item" href="/home" data-page="home">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5 12 3l9 7.5M6.5 9.5V21h4.5v-6h2v6h4.5V9.5" />
            </svg>
          </span>
          <span class="nav-label">Home</span>
          <span class="nav-badge try-text">Overview</span>
        </a>

        <a class="nav-item" href="/links" data-page="links">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9.5 14.5 7 17a4 4 0 1 1-5.7-5.6l3.3-3.4A4 4 0 0 1 10.3 9" />
              <path d="m14.5 9.5 2.5-2.5a4 4 0 1 1 5.7 5.6l-3.3 3.4A4 4 0 0 1 13.7 15" />
              <path d="m8.5 15.5 7-7" />
            </svg>
          </span>
          <span class="nav-label">Links</span>
          <span class="nav-badge try-text">Manage</span>
        </a>

        <a class="nav-item" href="/qr-codes" data-page="qr-codes">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4z" />
              <path d="M16 14h2M14 17h6M14 20h6M19 15v5" />
            </svg>
          </span>
          <span class="nav-label">QR Codes</span>
          <span class="nav-badge warm">Active</span>
        </a>

        <a class="nav-item" href="/pages" data-page="pages">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 3h10l4 4v14H7z" />
              <path d="M17 3v4h4M10 12h8M10 16h8M10 8h3" />
            </svg>
          </span>
          <span class="nav-label">Pages</span>
          <span class="nav-badge warm">Build</span>
        </a>

        <a class="nav-item" href="/analytics" data-page="analytics">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 20V9M10 20V4M16 20v-7M22 20v-3" />
            </svg>
          </span>
          <span class="nav-label">Analytics</span>
          <span class="nav-badge warm">Stats</span>
        </a>

        <a class="nav-item" href="/campaigns" data-page="campaigns">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h10v12H4zM14 10h6v8h-6z" />
              <path d="m15.5 5.5 1.2 1.2 2.8-2.7" />
            </svg>
          </span>
          <span class="nav-label">Campaigns</span>
          <span class="nav-badge try-text">Track</span>
        </a>

        <a class="nav-item hidden" href="/admin" data-page="admin" id="adminNavItem">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3 4 7v6c0 5 3.4 8.7 8 10 4.6-1.3 8-5 8-10V7z" />
              <path d="M9.5 12.5 11 14l4-4" />
            </svg>
          </span>
          <span class="nav-label">Admin</span>
          <span class="nav-badge cool">Manage</span>
        </a>

        <a class="nav-item" href="/custom-domains" data-page="custom-domains">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a9 9 0 1 0 9 9" />
              <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18" />
            </svg>
          </span>
          <span class="nav-label">Custom domains</span>
          <span class="nav-badge cool">Brand</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a class="nav-item settings-item" href="/settings" data-page="settings">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.5A3.5 3.5 0 1 1 8.5 12 3.5 3.5 0 0 1 12 8.5Z" />
              <path d="m19.4 15 1.3 2.2-2.1 2.1-2.2-1.3a7.7 7.7 0 0 1-2 .8l-.6 2.5h-3l-.6-2.5a7.7 7.7 0 0 1-2-.8l-2.2 1.3-2.1-2.1L4.6 15a7.7 7.7 0 0 1-.8-2L1.3 12l2.5-1a7.7 7.7 0 0 1 .8-2L3.3 6.8l2.1-2.1 2.2 1.3a7.7 7.7 0 0 1 2-.8l.6-2.5h3l.6 2.5a7.7 7.7 0 0 1 2 .8l2.2-1.3 2.1 2.1-1.3 2.2a7.7 7.7 0 0 1 .8 2l2.5 1-2.5 1a7.7 7.7 0 0 1-.8 2Z" />
            </svg>
          </span>
          <span class="nav-label">Settings</span>
        </a>
      </div>
    </aside>

    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="m14.5 6-6 6 6 6" />
      </svg>
    </button>

    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow" id="pageEyebrow">Workspace</p>
          <h1 class="topbar-title" id="pageTitle">AnyLink</h1>
        </div>

        <label class="searchbar" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="m20 20-4.2-4.2"></path>
          </svg>
          <input type="text" id="searchInput" placeholder="Search links, campaigns, domains..." />
        </label>

        <div class="topbar-actions">
          <button class="upgrade-button">Upgrade</button>
          <div class="profile-menu" id="profileMenu">
            <button class="profile-chip profile-trigger" id="profileMenuButton" type="button" aria-haspopup="menu" aria-expanded="false">
              <div class="avatar">L</div>
              <span class="profile-name">Luv Patel</span>
            </button>
            <div class="profile-dropdown hidden" id="profileDropdown" role="menu">
              <a class="profile-dropdown-item" href="/settings" role="menuitem">Settings</a>
              <a class="profile-dropdown-item hidden" href="/admin" role="menuitem" id="profileAdminLink">Admin Panel</a>
              <button class="profile-dropdown-item danger" id="logoutButton" type="button" role="menuitem">Log out</button>
            </div>
          </div>
        </div>
      </header>

      <section class="content-area" id="mainContent"></section>
    </main>
  </div>

  <script src="/script.js?v=30"></script>
</body>
</html>
